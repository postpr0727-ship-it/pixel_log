<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" /> <!-- Deep Blue -->
      <stop offset="100%" stop-color="#111827" /> <!-- Gray-900 -->
    </linearGradient>
    <linearGradient id="p-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" /> <!-- Gold / Yellow-400 -->
      <stop offset="100%" stop-color="#F59E0B" /> <!-- Amber-500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg-grad)" />
  
  <g transform="translate(130, 110)" filter="url(#glow)">
    <!-- Letter P -->
    <path d="M 50 0 L 150 0 C 210 0 250 40 250 100 C 250 160 210 200 150 200 L 120 200 L 120 290 L 50 290 Z M 120 60 L 120 140 L 140 140 C 165 140 180 125 180 100 C 180 75 165 60 140 60 Z" fill="url(#p-grad)" />
    <!-- Pixel accent square -->
    <rect x="180" y="210" width="70" height="70" rx="12" fill="url(#p-grad)" />
  </g>
</svg>
